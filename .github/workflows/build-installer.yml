name: Build Installer

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: nuget restore TireShopAccounting.sln

      - name: Resolve SQLite reference path
        shell: powershell
        run: |
          $dll = Get-ChildItem -Path ".\packages" -Recurse -Filter "System.Data.SQLite.dll" | Select-Object -First 1
          if (-not $dll) {
            Write-Host "SQLite DLL not found under packages. Dumping package tree..."
            Get-ChildItem -Path ".\packages" -Recurse | Select-Object FullName
            throw "System.Data.SQLite.dll not found after restore."
          }
          $dir = $dll.DirectoryName
          "SQLITE_REF_DIR=$dir" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Using SQLite reference path: $dir"

      - name: Build solution (Release)
        run: msbuild TireShopAccounting.sln /t:Rebuild /p:Configuration=Release /p:ReferencePath="%SQLITE_REF_DIR%" /v:m

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Compile installer
        shell: powershell
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            throw "ISCC.exe not found after install."
          }
          & $iscc ".\Installer\TireShopAccounting.iss"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: TireShopAccounting-Installer
          path: dist/*.exe
          if-no-files-found: error
